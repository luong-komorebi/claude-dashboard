name: Release Standalone Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach the binaries to (leave empty for draft)'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: claude-dashboard-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            name: claude-dashboard-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: claude-dashboard-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: claude-dashboard-windows-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        shell: bash
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # ── Node / web build ──────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        run: pnpm install --frozen-lockfile

      - name: Build WASM
        shell: bash
        run: pnpm --filter web build:wasm

      - name: Build web app
        shell: bash
        env:
          # For the offline binary we DON'T want a GitHub Pages base path.
          # Paths are relative to the server root, so leave VITE_BASE_PATH unset.
          VITE_BASE_PATH: /
        run: pnpm --filter web build

      # ── Server binary ─────────────────────────────────────────────────────
      - name: Build server binary
        shell: bash
        run: cargo build --release --manifest-path server/Cargo.toml --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/claude-dashboard.exe staging/${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/claude-dashboard staging/${{ matrix.name }}
            chmod +x staging/${{ matrix.name }}
          fi
          ls -lh staging/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: staging/${{ matrix.name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          ls -lh release/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' }}
