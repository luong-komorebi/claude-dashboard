name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # ── Rust / WASM ────────────────────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # ── Node / web ─────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v6
        with:
          version: latest
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # WASM must be built before tsc/tests — several pages do
      # `import('../wasm-pkg/claude_analytics')` and the typechecker resolves
      # these at test time.
      - name: Build WASM
        run: pnpm --filter web build:wasm

      - name: Cargo test (WASM unit tests)
        run: cargo test --manifest-path wasm/Cargo.toml

      - name: Type check
        run: pnpm --filter web exec tsc --noEmit

      - name: Run web tests
        run: pnpm --filter web test

      - name: Build web app
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm --filter web build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
