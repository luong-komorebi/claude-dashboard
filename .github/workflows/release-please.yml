name: Release Please

# Watches `main` for Conventional Commits (feat, fix, perf, refactor, docs, …).
# When a release is warranted, opens a "Release PR" that bumps versions in
# Cargo.toml / package.json and regenerates CHANGELOG.md. Merging that PR
# creates the `v0.x.y` tag and GitHub release — and immediately invokes
# `release.yml` via workflow_call to build the cross-platform binaries.
#
# Why invoke instead of waiting for the tag-push trigger?
#   GitHub suppresses workflow triggers for events created by GITHUB_TOKEN
#   (to prevent infinite loops). Since release-please uses GITHUB_TOKEN to
#   push the tag, `release.yml`'s `push: tags: [v*]` trigger would NEVER
#   fire. Calling the reusable workflow directly bypasses that limitation.
#
# Docs: https://github.com/googleapis/release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Summarize result
        if: always()
        # IMPORTANT: release-please's `pr` output is a JSON object containing
        # unescaped quotes, parentheses, and newlines (the PR body). Never
        # interpolate ${{ ... }} directly into bash — the shell parser will
        # choke on the first `"` in the title or body. Pass through env so
        # bash only sees $VAR, not the raw content.
        env:
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          {
            echo "# Release Please"
            if [ "${RELEASE_CREATED}" = "true" ]; then
              echo "✅ **Released \`${TAG_NAME}\`**"
              echo ""
              echo "Invoking \`Release Standalone Binaries\` to build cross-platform artifacts…"
            elif [ -n "${PR_JSON}" ]; then
              # Extract just the PR number instead of dumping the whole JSON blob
              PR_NUMBER="$(printf '%s' "${PR_JSON}" | python3 -c 'import sys, json; print(json.load(sys.stdin).get("number", ""))' 2>/dev/null || true)"
              if [ -n "${PR_NUMBER}" ]; then
                echo "📝 Release PR updated: #${PR_NUMBER}"
              else
                echo "📝 Release PR updated."
              fi
              echo ""
              echo "Merge the PR to cut the next release."
            else
              echo "No release-worthy commits since the last tag."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build-binaries:
    name: Build binaries
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: write
