    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Dashboard</title>

      FOUC prevention: apply the stored theme before CSS parses.

      changes to bust the service worker cache.
    -->
    <script src="theme-init.js?v=1"></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
